name: gyaan_saarthi
description: Educational app for government schools - शिक्षा का साथी

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^8.0.1
  flutter_svg: ^2.0.9
  font_awesome_flutter: ^10.6.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  dio: ^5.4.0
  http: ^1.1.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  sqflite: ^2.3.0
  
  # Speech & Audio
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  record: ^6.2.0
  audioplayers: ^6.5.1
  permission_handler: ^12.0.1
  
  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Video
  video_player: ^2.8.2
  chewie: ^1.7.4
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  path_provider: ^2.1.2
  url_launcher: ^6.2.3
  shimmer: ^3.0.0
  lottie: ^3.3.2
  package_info_plus: ^8.1.2
  wakelock_plus: ^1.2.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  
  # Commented out fonts until you add the actual font files
  # Uncomment after downloading Poppins fonts
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700