name: gyaan_saarthi
description: Educational app for government schools - शिक्षा का साथी

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ========================================
  # UI & ICONS
  # ========================================
  cupertino_icons: ^1.0.6
  
  # ========================================
  # STATE MANAGEMENT
  # ========================================
  provider: ^6.1.1
  
  # ========================================
  # HTTP & API
  # ========================================
  dio: ^5.4.0
  
  # ========================================
  # LOCAL STORAGE
  # ========================================
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # ========================================
  # MEDIA
  # ========================================
  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Audio Recording
  record: ^6.2.0
  permission_handler: ^12.0.1
  
  # ========================================
  # UTILS
  # ========================================
  intl: ^0.20.2
  url_launcher: ^6.2.3
  video_player: ^2.11.0
  chewie: ^1.13.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/